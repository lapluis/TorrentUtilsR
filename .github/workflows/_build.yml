name: _build

on:
  workflow_call:
    inputs:
      bin_name:
        required: true
        type: string
      release_tag:
        required: false
        default: ""
        type: string

permissions:
  contents: write

env:
  BIN_NAME: ${{ inputs.bin_name }}
  CARGO_TERM_COLOR: always

jobs:
  build-matrix:
    name: build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2025
            target: x86_64-pc-windows-msvc
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-musl
          - os: macos-15
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Install musl-tools
        if: matrix.os == 'ubuntu-24.04'
        run: sudo apt-get install -y musl-tools

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --target ${{ matrix.target }} --release

      - name: Prepare binary
        id: prepare_binary
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${{ inputs.release_tag }}" ]; then
            STAGING="${{ env.BIN_NAME }}_${{ github.sha }}_${{ matrix.target }}"
          else
            STAGING="${{ env.BIN_NAME }}_${{ inputs.release_tag }}_${{ matrix.target }}"
          fi

          case "${{ matrix.os }}" in
            windows-2025)
              cp "target/${{ matrix.target }}/release/${{ env.BIN_NAME }}.exe" "target/$STAGING.exe"
              echo "asset=target/$STAGING.exe" >> "$GITHUB_OUTPUT"
              ;;
            windows-11-arm)
              cp "target/${{ matrix.target }}/release/${{ env.BIN_NAME }}.exe" "target/$STAGING.exe"
              echo "asset=target/$STAGING.exe" >> "$GITHUB_OUTPUT"
              ;;
            macos-15)
              cp "target/${{ matrix.target }}/release/${{ env.BIN_NAME }}" "target/$STAGING"
              chmod +x "target/$STAGING"
              echo "asset=target/$STAGING" >> "$GITHUB_OUTPUT"
              ;;
            *)
              # Linux
              cp "target/${{ matrix.target }}/release/${{ env.BIN_NAME }}" "target/$STAGING"
              echo "asset=target/$STAGING" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Upload artifact
        if: inputs.release_tag == ''
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.BIN_NAME }}-${{ matrix.target }}-${{ github.sha }}
          path: ${{ steps.prepare_binary.outputs.asset }}
          if-no-files-found: error

      - name: Upload to GitHub Release
        if: inputs.release_tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ inputs.release_tag }}" "${{ steps.prepare_binary.outputs.asset }}" --clobber
